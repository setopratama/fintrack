<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>FinTrack - Tambah Transaksi</title>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-xl overflow-hidden">
        <!-- Header -->
        <header class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-800">
            <button
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold">Tambah Transaksi</h1>
            <div class="w-10"></div> <!-- Spacer for symmetry -->
        </header>
        <!-- Main Form -->
        <main class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Transaction Type Toggle -->
            <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
                <label class="flex-1 relative cursor-pointer group">
                    <input class="sr-only peer" name="transaction_type" type="radio" value="pemasukan" />
                    <div
                        class="py-2.5 text-center rounded-lg text-sm font-semibold transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm peer-checked:text-primary text-slate-500">
                        Pemasukan
                    </div>
                </label>
                <label class="flex-1 relative cursor-pointer group">
                    <input checked="" class="sr-only peer" name="transaction_type" type="radio" value="pengeluaran" />
                    <div
                        class="py-2.5 text-center rounded-lg text-sm font-semibold transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm peer-checked:text-red-500 text-slate-500">
                        Pengeluaran
                    </div>
                </label>
            </div>
            <!-- Amount Input -->
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Jumlah</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-xl font-bold text-primary">Rp</span>
                    <input
                        class="w-full pl-14 pr-4 py-4 text-2xl font-bold bg-slate-50 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-primary/50 text-slate-900 dark:text-white"
                        placeholder="0" type="number" />
                </div>
            </div>
            <!-- Category Picker -->
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Kategori</label>
                <div class="relative group">
                    <select
                        class="w-full appearance-none pl-12 pr-10 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                        <option disabled="" selected="" value="">Pilih Kategori</option>
                        <option value="gaji">Gaji</option>
                        <option value="makan">Makan &amp; Minum</option>
                        <option value="transport">Transportasi</option>
                        <option value="belanja">Belanja</option>
                        <option value="hiburan">Hiburan</option>
                    </select>
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">category</span>
                    <span
                        class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                </div>
            </div>
            <!-- Date Picker -->
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Tanggal</label>
                <div class="relative">
                    <input
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all"
                        type="date" value="2023-10-27" />
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">calendar_today</span>
                </div>
            </div>
            <!-- Notes -->
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Keterangan</label>
                <div class="relative">
                    <textarea
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all resize-none"
                        placeholder="Tambahkan catatan (opsional)" rows="3"></textarea>
                    <span class="material-symbols-outlined absolute left-4 top-4 text-primary">description</span>
                </div>
            </div>
        </main>
        <!-- Footer Buttons -->
        <footer class="p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
            <div class="flex gap-4">
                <button
                    class="flex-1 py-3.5 px-6 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-semibold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    Batal
                </button>
                <button
                    class="flex-[2] py-3.5 px-6 bg-primary text-white font-semibold rounded-xl hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                    Simpan
                </button>
            </div>
        </footer>
    </div>
</body>

</html>
